<!DOCTYPE html>
<html>
<head>
    <title>Travel Loop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Travel Loop</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Explore The World</h1>
    <p>Plan your perfect trip</p>
</div>

<!-- PACKAGES -->
<div class="container mt-5">
    <h2 class="text-center mb-4">Popular Packages</h2>
    <div class="row" id="packages"></div>
</div>

<!-- BUDGET SUMMARY -->
<div class="container mt-5">
    <h2 class="text-center mb-4">Budget Summary</h2>

    <div class="card shadow p-4 text-center">
        <h4>Selected Country</h4>
        <h2 id="countryName">None</h2>

        <hr>

        <h5>Total Price</h5>
        <h3 class="text-success">₹<span id="priceValue">0</span></h3>

        <button class="btn btn-warning mt-3" onclick="goBooking()">
            Proceed to Book
        </button>
    </div>
</div>

<footer>
    © 2026 Travel Loop
</footer>

<script src="script.js"></script>
</body>
</html>
