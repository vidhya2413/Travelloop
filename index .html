<!DOCTYPE html>
<html>

<head>
    <title>Travel Loop</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="index.html">Travel Loop</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="register.html">Register</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- HERO -->
<div class="hero text-center text-white d-flex flex-column justify-content-center align-items-center">
    <h1>Explore The World</h1>
    <p>Plan your perfect trip</p>
</div>

<!-- PACKAGES -->
<div class="container mt-5">
    <h2 class="text-center mb-4">Popular Packages</h2>

    <div class="row" id="packages">

        <!-- Static sample cards (backup if JS fails) -->
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4>Paris</h4>
                <p>₹25,000</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4>Maldives</h4>
                <p>₹18,000</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4>Switzerland</h4>
                <p>₹40,000</p>
            </div>
        </div>

    </div>
</div>

<!-- BUDGET -->
<div class="container mt-5">
    <h2 class="text-center mb-4">Budget Summary</h2>

    <div class="card shadow p-4 text-center">

        <h4>Selected Country</h4>
        <h2 id="countryName">None</h2>

        <hr>

        <h5>Total Price</h5>
        <h3 class="text-success">₹<span id="priceValue">0</span></h3>

        <button class="btn btn-warning mt-3" onclick="goBooking()">
            Proceed to Book
        </button>

    </div>
</div>

<!-- FOOTER -->
<footer class="text-center p-3 mt-5 bg-dark text-white">
    © 2026 Travel Loop
</footer>

<!-- SCRIPT -->
<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function goBooking(){
    alert("Redirecting to booking page...");
    window.location.href = "booking.html";
}
</script>

</body>
</html>
