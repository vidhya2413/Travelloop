<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center">Booking Page</h2>

        <form onsubmit="book(event)">
            <input class="form-control mb-3" placeholder="Name" required>
            <input class="form-control mb-3" placeholder="Email" required>

            <input id="c" class="form-control mb-3" readonly>
            <input id="p" class="form-control mb-3" readonly>

            <input type="date" class="form-control mb-3" required>

            <button class="btn btn-success w-100">
                Confirm Booking
            </button>
        </form>

    </div>
</div>

<script>
document.getElementById("c").value = localStorage.getItem("country");
document.getElementById("p").value = "₹" + localStorage.getItem("price");

function book(e){
    e.preventDefault();
    alert("Booking Successful 🎉");
    localStorage.clear();
}
</script>

</body>
</html>
